---
apiVersion: "apps/v1"
kind: "Deployment"
metadata:
  name: "dr-development-dbadmin-deployment"
  labels:
    app.kubernetes.io/name: "datarizen"
    app.kubernetes.io/component: "dr-development-dbadmin"
    app.kubernetes.io/instance: "{{.Release.Name}}"
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "datarizen"
        app.kubernetes.io/component: "dr-development-dbadmin"
        app.kubernetes.io/instance: "{{.Release.Name}}"
    spec:
      containers:
        - image: "dpage/pgadmin4:9.12.0"
          name: "dr-development-dbadmin"
          envFrom:
            - configMapRef:
                name: "dr-development-dbadmin-config"
          ports:
            - name: "http"
              protocol: "TCP"
              containerPort: 80
          imagePullPolicy: "IfNotPresent"
  selector:
    matchLabels:
      app.kubernetes.io/name: "datarizen"
      app.kubernetes.io/component: "dr-development-dbadmin"
      app.kubernetes.io/instance: "{{.Release.Name}}"
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: "RollingUpdate"
