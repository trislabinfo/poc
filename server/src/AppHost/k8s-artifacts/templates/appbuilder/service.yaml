---
apiVersion: "v1"
kind: "Service"
metadata:
  name: "appbuilder-service"
  labels:
    app.kubernetes.io/name: "datarizen"
    app.kubernetes.io/component: "appbuilder"
    app.kubernetes.io/instance: "{{.Release.Name}}"
spec:
  type: "ClusterIP"
  selector:
    app.kubernetes.io/name: "datarizen"
    app.kubernetes.io/component: "appbuilder"
    app.kubernetes.io/instance: "{{.Release.Name}}"
  ports:
    - name: "http"
      protocol: "TCP"
      port: "{{ .Values.parameters.appbuilder.port_http }}"
      targetPort: "{{ .Values.parameters.appbuilder.port_http }}"
    - name: "https"
      protocol: "TCP"
      port: "{{ .Values.parameters.appbuilder.port_https }}"
      targetPort: "{{ .Values.parameters.appbuilder.port_https }}"
    - name: "appbuilderHttp"
      protocol: "TCP"
      port: 61022
      targetPort: 61022
    - name: "appbuilderHttps"
      protocol: "TCP"
      port: 61021
      targetPort: 61021
