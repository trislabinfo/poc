---
apiVersion: "apps/v1"
kind: "Deployment"
metadata:
  name: "identity-deployment"
  labels:
    app.kubernetes.io/name: "datarizen"
    app.kubernetes.io/component: "identity"
    app.kubernetes.io/instance: "{{.Release.Name}}"
spec:
  template:
    metadata:
      labels:
        app.kubernetes.io/name: "datarizen"
        app.kubernetes.io/component: "identity"
        app.kubernetes.io/instance: "{{.Release.Name}}"
    spec:
      containers:
        - image: "{{ .Values.parameters.identity.identity_image }}"
          name: "identity"
          envFrom:
            - configMapRef:
                name: "identity-config"
            - secretRef:
                name: "identity-secrets"
          ports:
            - name: "http"
              protocol: "TCP"
              containerPort: "{{ .Values.parameters.identity.port_http }}"
            - name: "https"
              protocol: "TCP"
              containerPort: "{{ .Values.parameters.identity.port_https }}"
            - name: "identityHttp"
              protocol: "TCP"
              containerPort: 61002
            - name: "identityHttps"
              protocol: "TCP"
              containerPort: 61001
          imagePullPolicy: "IfNotPresent"
  selector:
    matchLabels:
      app.kubernetes.io/name: "datarizen"
      app.kubernetes.io/component: "identity"
      app.kubernetes.io/instance: "{{.Release.Name}}"
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: "RollingUpdate"
