---
apiVersion: "v1"
kind: "Service"
metadata:
  name: "tenant-service"
  labels:
    app.kubernetes.io/name: "datarizen"
    app.kubernetes.io/component: "tenant"
    app.kubernetes.io/instance: "{{.Release.Name}}"
spec:
  type: "ClusterIP"
  selector:
    app.kubernetes.io/name: "datarizen"
    app.kubernetes.io/component: "tenant"
    app.kubernetes.io/instance: "{{.Release.Name}}"
  ports:
    - name: "tenant-http"
      protocol: "TCP"
      port: 61012
      targetPort: 61012
    - name: "tenant-https"
      protocol: "TCP"
      port: 61011
      targetPort: 61011
